<style>

  :root, [data-theme="dark"] {

  }
  [data-theme="light"] {

    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; transition:background .2s ease, color .2s ease; }
  a { color:inherit; }

  nav { position:sticky; top:0; z-index:50; background:color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter:blur(10px); border-bottom:1px solid var(--border-2); }
  .nav-inner { max-width:1080px; margin:0 auto; padding:9px 22px; min-height:62px; display:flex; align-items:center; gap:6px 12px; flex-wrap:wrap; }

  .nav-user { display:flex; align-items:center; gap:8px; flex:0 0 auto; }

  @media (max-width:560px){ .nav-pages{ width:100%; order:3; justify-content:flex-start; gap:0; } .nav-user{ margin-left:auto; } }

  @media (max-width:560px){ .brand-tag { display:none; } }

  .nav-link:hover { color:var(--accent); background:var(--panel-2); }

  .cat-count { font-size:0.72rem; font-weight:700; opacity:.65; } .cat-tab.active .cat-count { opacity:.9; color:#d6e6ff; }

  .back-link { background:none; border:none; cursor:pointer; font-family:inherit; color:var(--mid); font-size:0.88rem;

    border-radius:0 8px 8px 0; padding:12px 15px; font-size:0.98rem; line-height:1.55; color:var(--ink); font-weight:600; margin-bottom:10px; }
  .answer-textarea { width:100%; min-height:84px; padding:13px 15px; background:var(--bg-2); border:1.5px solid var(--border);
    border-radius:9px; color:var(--ink); font-size:0.94rem; line-height:1.6; font-family:inherit; resize:vertical; }
  .answer-textarea:focus { outline:none; border-color:var(--accent-2); }
  .answer-textarea::placeholder { color:var(--dim); }
  .grade-btn { margin-top:10px; padding:10px 24px; border:none; border-radius:999px; background:color-mix(in srgb,var(--accent-3) 22%,transparent);

  .grade-btn:hover:not(:disabled) { background:var(--accent-3); color:#fff; } .grade-btn:disabled { opacity:.45; cursor:default; }
  .rubric { margin-top:12px; background:var(--bg-2); border:1.5px solid var(--border); border-radius:9px; padding:14px 16px; }

  .vignette-label { font-size:0.82rem; font-weight:800; letter-spacing:1.6px; color:var(--accent); text-transform:uppercase; margin-bottom:9px; }

  .qblock { background:var(--panel); border:1.5px solid var(--border); border-radius:20px; padding:26px; margin-bottom:14px;

  .qstem { font-size:1.08rem; line-height:1.55; color:var(--ink); font-weight:600; margin-bottom:18px; }
  .choices { display:flex; flex-direction:column; gap:9px; }

    color:var(--ink); font-size:0.95rem; line-height:1.5; font-weight:500; cursor:pointer; transition:all .13s; font-family:inherit; display:flex; gap:10px; }
  .choice:hover:not(:disabled) { border-color:var(--accent-2); }

  .choice.correct .choice-letter { color:var(--good); } .choice.wrong .choice-letter { color:var(--bad); }
  .kbd-hint { font-size:0.76rem; color:var(--dim); margin-top:11px; }
  .feedback { margin-top:14px; padding:14px 17px; background:var(--bg-2); border-left:3px solid var(--good); border-radius:0 8px 8px 0;
    font-size:0.92rem; line-height:1.65; color:var(--ink); font-weight:500; animation:fade .25s ease; }
  .feedback.bad { border-left-color:var(--bad); }
  .fb-result { font-weight:800; margin-bottom:5px; }
  @keyframes fade { from { opacity:0; transform:translateY(5px);} to { opacity:1;} }
  .submit-btn, .next-btn { margin-top:15px; padding:11px 28px; border:none; border-radius:999px; font-family:inherit;
    font-size:0.88rem; font-weight:700; cursor:pointer; background:var(--accent-3); color:#fff; transition:all .13s; }

  .flow { display:flex; flex-wrap:wrap; align-items:stretch; gap:8px; margin-bottom:22px; }
  .flow-node { background:var(--panel); border:1.5px solid var(--border); border-radius:9px; padding:10px 13px; font-size:0.82rem; font-weight:700; color:var(--ink); display:flex; align-items:center; }
  .flow-node.last { border-color:var(--good); color:var(--good); }

  .flow-node.dim, .chain-step.dim { opacity:.28; cursor:pointer; } .flow-arrow.dim { opacity:.28; }

  .reveal-next:hover { border-color:var(--accent-2); }
  .mech-cols { display:grid; grid-template-columns:1fr 300px; gap:24px; align-items:start; }
  .mech-curve { position:sticky; top:80px; }
  @media (max-width:760px){ .mech-cols { grid-template-columns:1fr; } .mech-curve { position:static; } }
  .chain { display:flex; flex-direction:column; } .chain-step { display:flex; }

  .starling-label { font-size:0.68rem; font-weight:800; letter-spacing:1px; color:var(--accent); text-transform:uppercase; margin-bottom:9px; }

  .curve-wrap { margin-top:8px; background:var(--panel); border:1.5px solid var(--border); border-radius:18px; padding:18px 18px 14px; }
  .curve-toggle { display:inline-flex; gap:4px; background:var(--panel-2); border:1px solid var(--border); border-radius:999px; padding:4px; margin-bottom:14px; }
  .curve-btn { border:none; background:transparent; color:var(--mid); font-family:inherit; font-weight:700; font-size:0.8rem; padding:8px 16px; border-radius:999px; cursor:pointer; }
  .curve-btn.on { background:var(--accent-3); color:#fff; }
  .curve-svg { width:100%; height:auto; display:block; }
  .curve-axis { stroke:var(--border); stroke-width:1.5; } .curve-axislabel { fill:var(--mid); font-size:11px; font-weight:600; }
  .curve-normal { stroke:var(--dim); stroke-width:2; stroke-dasharray:4 4; } .curve-failing { stroke:var(--accent-2); stroke-width:2.5; }
  .curve-label-normal { fill:var(--dim); font-size:11px; font-weight:700; } .curve-label-failing { fill:var(--accent); font-size:11px; font-weight:700; }

  .curve-dot { fill:var(--good); stroke:var(--panel); stroke-width:3; }
  .curve-readout { display:flex; flex-wrap:wrap; gap:16px; margin-top:12px; font-size:0.86rem; color:var(--ink-soft); }
  .curve-readout b { color:var(--ink); font-weight:700; }

  .curve-wrap.compact .curve-svg { max-width:330px; margin:0 auto; }

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ===================== shared helpers ===================== */
const MODES = [
  { key:"ms1", label:"MS1", sub:"Foundations", live:true },
  { key:"ms2", label:"MS2", sub:"Integration", live:false },
  { key:"ms3", label:"MS3", sub:"Clerkship", live:false },
  { key:"ms4", label:"MS4", sub:"Boards", live:false },
];
const CATEGORY_ORDER = ["Cardiology","Pulmonology","Hematology"];
function categoryOf(system){ const s=(system||"").toLowerCase();
  if(s.includes("cardio"))return "Cardiology"; if(s.includes("hema"))return "Hematology";
  if(s.includes("resp")||s.includes("pulmon")||s.includes("transport"))return "Pulmonology"; return "Other"; }
function loadLS(k,f){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):f; }catch(e){ return f; } }
function saveLS(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function gradeAnswer(text,rubric){ const lower=text.toLowerCase();
  return rubric.map(it=>({concept:it.concept, hit:it.keywords.some(kw=>lower.includes(kw.toLowerCase()))})); }

/* ===================== board lint (the Forge gate) ===================== */
const STOP=new Set("the a an of to in is are was were with and or for on at by from as has have had patient who which following most likely best explains shows this that these those".split(/\s+/));
const w=s=>(s||"").toLowerCase().match(/[a-z][a-z\-]{1,}/g)||[];
const cont=s=>w(s).filter(x=>x.length>3&&!STOP.has(x));
const ch=s=>(s||"").trim().length;
const fnum=s=>{const m=(s||"").replace(/,/g,"").match(/-?\d+(\.\d+)?/);return m?parseFloat(m[0]):null;};
function boardLint(it){
  const t=it.options||[],key=t[it.answerIndex]||"",d=t.filter((_,i)=>i!==it.answerIndex),lead=(it.leadIn||"").trim();
  const f=[];
  if(!/which of the following/i.test(lead)||!lead.endsWith("?")) f.push("lead-in form");
  if(/which of the following (statements?|is true|is correct)/i.test(lead)) f.push("cover-the-options");
  if(ch(key)>0&&d.length>0&&d.every(x=>ch(x)<ch(key))) f.push("key is longest");
  if(t.some(x=>/\b(none|all|both) of the (above|following)\b/i.test(x))) f.push("none/all of above");
  if(/\b(except|not|least)\b/i.test(lead)&&!/\bEXCEPT\b/.test(lead)) f.push("negative lead-in");
  if(/[—–]/.test((it.vignette||"")+lead+t.join(" "))) f.push("em/en dash");
  (()=>{const ss=new Set(cont((it.vignette||"")+" "+lead));const cl=cont(key).filter(x=>ss.has(x)&&!d.some(y=>w(y).includes(x)));if(cl.length) f.push("clang");})();
  if(t.length<4||t.length>5) f.push("option count");
  return {ok:f.length===0, fails:f};
}
function buildQuestions(){
  const out=[];
  (window.CASES||[]).filter(c=>c.active!==false&&c.ms1&&c.ms1.questions).forEach(c=>{
    c.ms1.questions.forEach((q,i)=>{ if(!q.choices) return;
      const it={id:c.id+"-"+(q.id||i),caseId:c.id,caseTitle:c.title,system:c.system,topic:c.topic,
        vignette:(c.vignette||"").replace(/\s+/g," ").trim(),leadIn:q.stem,options:q.choices,answerIndex:q.correct,
        explanation:q.feedback,source:"Ward Moments"};
      it.lint=boardLint(it); out.push(it); });
  });
  return out;
}

/* ===================== Ward Moments components (Learn) ===================== */
function Prompt({ prompt, value, onChange, onSave }){
  const [results,setResults]=useState(null);
  const grade=()=>{ if(!value.trim())return; setResults(gradeAnswer(value,prompt.rubric)); onSave&&onSave(); };
  return (<div className="prompt-block">
    <div className="prompt-q">{prompt.question}</div>
    <textarea className="answer-textarea" placeholder={prompt.hint||"Answer in your own words…"} value={value}
      onChange={e=>{onChange(e.target.value); setResults(null);}} onBlur={()=>value.trim()&&onSave&&onSave()} />
    <button className="grade-btn" disabled={!value.trim()} onClick={grade}>Submit</button>
    {results && (<div className="rubric"><div className="rubric-head">Key concepts</div>
      {results.map((r,i)=>(<div key={i} className={"rubric-item "+(r.hit?"rubric-hit":"rubric-miss")}>
        <span className="rubric-cdot" /><span>{r.concept}</span></div>))}</div>)}
  </div>);
}

const DEFAULT_FS = { title:"Frank-Starling curve", xLabel:"End-diastolic volume (preload) →", yLabel:"Stroke volume →",
  paths:[ { d:"M50,196 C 85,150 100,80 140,62 C 200,40 280,40 350,40", label:"Normal contractility", lx:250, ly:34, muted:true },
          { d:"M50,198 C 90,176 122,134 150,121 C 210,106 290,128 350,140", label:"Heart failure", lx:262, ly:160, muted:false } ] };
function StarlingCurve({ compact=false, phase="interactive", curves="both", point=null, config=null }){
  const cfg=config||DEFAULT_FS; const interactive=phase==="interactive";
  const [sel,setSel]=useState("before"); const [anim,setAnim]=useState("before");
  useEffect(()=>{ if(phase==="animate"){ setAnim("before"); const t=setTimeout(()=>setAnim("after"),450); return ()=>clearTimeout(t); } },[phase]);
  const cur = phase==="none"?null : phase==="interactive"?sel : phase==="animate"?anim : phase;
  const pts={ before:{x:320,y:138,edv:"very high",sv:"low",cong:"present"}, after:{x:150,y:121,edv:"reduced",sv:"improved",cong:"relieved"} };
  const p = point?{x:point[0],y:point[1]} : (cur?pts[cur]:null);
  const paths = curves==="normal"?cfg.paths.filter(pp=>pp.muted):cfg.paths;
  return (<div className={"curve-wrap "+(compact?"compact":"")}>
    {compact && <div className="curve-mini-label">{cfg.title}</div>}
    {interactive && !point && (<div className="curve-toggle">
      <button className={"curve-btn "+(sel==="before"?"on":"")} onClick={()=>setSel("before")}>Before diuresis</button>
      <button className={"curve-btn "+(sel==="after"?"on":"")} onClick={()=>setSel("after")}>After furosemide</button></div>)}
    <svg viewBox="0 0 380 250" className="curve-svg" role="img" aria-label={cfg.title}>

      <line x1="50" y1="200" x2="50" y2="26" className="curve-axis" />
      <text x="205" y="240" className="curve-axislabel" textAnchor="middle">{cfg.xLabel}</text>
      <text x="16" y="118" className="curve-axislabel" textAnchor="middle" transform="rotate(-90 16 118)">{cfg.yLabel}</text>
      {paths.map((pp,i)=>(<React.Fragment key={i}>
        <path d={pp.d} className={pp.muted?"curve-normal":"curve-failing"} fill="none" />
        <text x={pp.lx} y={pp.ly} className={pp.muted?"curve-label-normal":"curve-label-failing"}>{pp.label}</text></React.Fragment>))}
      {p && <line x1={p.x} y1={p.y} x2={p.x} y2="200" className="curve-guide" />}
      {p && <line x1={p.x} y1={p.y} x2="50" y2={p.y} className="curve-guide" />}
      {p && (<g style={{transform:`translate(${p.x}px, ${p.y}px)`, transition:"transform .55s cubic-bezier(.4,0,.2,1)"}}><circle r="7" className="curve-dot" /></g>)}
    </svg>
    {p && !point && (<div className="curve-readout"><span><b>Preload:</b> {p.edv}</span><span><b>Stroke volume:</b> {p.sv}</span><span><b>Congestion:</b> {p.cong}</span></div>)}
  </div>);
}

const ankiLetter=i=>String.fromCharCode(65+i);
function buildAnkiCard({ stem, choices, correct, explanation }){
  const front=stem+"<br><br>"+choices.map((o,i)=>ankiLetter(i)+". "+o).join("<br>");
  const back="Answer: "+ankiLetter(correct)+". "+choices[correct]+(explanation?"<br><br>"+explanation:"");
  return { front, back };
}
function AnkiButton({ front, back, style }){
  const [copied,setCopied]=useState(false);
  const copy=()=>{ const clean=s=>String(s).replace(/[\t\r\n]+/g," ");
    navigator.clipboard.writeText(clean(front)+"\t"+clean(back)); setCopied(true); setTimeout(()=>setCopied(false),9000); };
  return (<span className="anki-wrap" style={style}>
    <button className="anki-btn" onClick={copy}
      title="Copies this question as one Anki card: the question is the Front, the answer and explanation are the Back, separated by a Tab.">
      {copied?"Copied for Anki ✓":"⎘ Anki card"}</button>
    {copied && (<span className="anki-help">Copied as <b>Front&nbsp;⇥&nbsp;Back</b>. To add it in Anki: paste into a blank text file and save it, then in Anki choose <b>File ▸ Import</b>, set note type to <b>Basic</b> and <b>Fields separated by: Tab</b>.</span>)}
  </span>);
}
function Quiz({ questions, intro, onComplete }){
  const [current,setCurrent]=useState(0); const [selected,setSelected]=useState(null);
  const [submitted,setSubmitted]=useState(false); const [score,setScore]=useState(0); const blockRef=useRef(null);
  const q=questions[current]; const total=questions.length;
  const pct=((current+(submitted?1:0))/total)*100;
  const reached=questions.slice(0,current+1).filter(qq=>!qq.placeholder).length - ((!q.placeholder&&!submitted)?1:0);
  const submit=()=>{ if(selected===null)return; setSubmitted(true); if(selected===q.correct) setScore(s=>s+1); };
  const next=()=>{ if(current+1>=total){ onComplete(); return; } setCurrent(c=>c+1); setSelected(null); setSubmitted(false); };
  useEffect(()=>{ if(current>0&&blockRef.current) blockRef.current.scrollIntoView({behavior:"smooth",block:"start"}); },[current]);
  useEffect(()=>{ const onKey=(e)=>{ if(e.target.tagName==="TEXTAREA"||e.target.tagName==="INPUT")return;
    if(q.placeholder){ if(e.key==="Enter"){ next(); e.preventDefault(); } return; }
    if(!submitted){ const n=parseInt(e.key,10); if(q.choices&&n>=1&&n<=q.choices.length){ setSelected(n-1); e.preventDefault(); }
      else if(e.key==="Enter"&&selected!==null){ submit(); e.preventDefault(); } }
    else if(e.key==="Enter"){ next(); e.preventDefault(); } };
    window.addEventListener("keydown",onKey); return ()=>window.removeEventListener("keydown",onKey); },[current,selected,submitted,q]);
  return (<div>
    <div className="prow"><span className="pill">Q {current+1} / {total}</span><span className="pill">Score {score} / {reached}</span>
      <div className="pbar"><div className="pfill" style={{width:`${pct}%`}} /></div></div>
    {intro && <p className="mode-intro">{intro}</p>}
    <div className="qblock" ref={blockRef}>
      <div className="qid">Question {q.id}
        {submitted && !q.placeholder && <AnkiButton {...buildAnkiCard({stem:q.stem,choices:q.choices,correct:q.correct,explanation:q.feedback})} style={{float:"right"}} />}</div>
      {q.placeholder ? (<div className="placeholder-q"><span className="inprog-badge">Coming soon</span>
        <p style={{margin:"12px 0",color:"var(--mid)"}}>{q.topic}</p>
        <button className="next-btn" onClick={next}>{current+1>=total?"See the mechanism →":"Next →"}</button></div>)
      : (<><p className="qstem">{q.stem}</p>
        {q.curve && <StarlingCurve compact {...(submitted?q.curve.post:q.curve.pre)} />}
        <div className="choices">{q.choices.map((c,i)=>{ let cls="choice";
          if(submitted){ if(i===q.correct)cls+=" correct"; else if(i===selected)cls+=" wrong"; } else if(i===selected)cls+=" selected";
          return (<button key={i} className={cls} disabled={submitted} onClick={()=>setSelected(i)}>
            <span className="choice-letter">{String.fromCharCode(65+i)}</span><span>{c}</span></button>); })}</div>
        {!submitted && (<><button className="submit-btn" disabled={selected===null} onClick={submit}>Submit Answer</button>
          <div className="kbd-hint">Tip: press {q.choices.length===5?"1 to 5":"1 to 4"} to choose, Enter to submit.</div></>)}
        {submitted && (<div className={"feedback "+(selected!==q.correct?"bad":"")}>
          <div className="fb-result" style={{color:selected===q.correct?"var(--good)":"var(--bad)"}}>{selected===q.correct?"✓ Correct":"✗ Not quite"}</div>
          {q.feedback}<br /><button className="next-btn" onClick={next}>{current+1>=total?"See the mechanism →":"Next question →"}</button></div>)}
      </>)}
    </div>
  </div>);
}
function MechanismReveal({ mechanism }){

      <div className="mech-cols"><div className="mech-steps"><div className="flow">
        {flow.map((n,i)=>{ const dim=i>=shownFlow; const arrowDim=(i+1)>=shownFlow;
          return (<React.Fragment key={i}>
            <div className={"flow-node "+(i===flow.length-1?"last ":"")+(dim?"dim":"")} onClick={()=>dim&&setShownFlow(i+1)}>{n}</div>

        {mechanism.graphic && mechanism.quickPts && (<div className="mech-curve">

  </div>);

  const openAuthor=a=>{ setAuthorSel(a); setMode("authors"); };
  const [activeId,setActiveId]=useState(null);
  const [progress,setProgressRaw]=useState(()=>loadLS("os_progress",{}));
  const [review,setReview]=useState(()=>loadLS("os_review",[]));
  const [answers,setAnswersRaw]=useState(()=>loadLS("os_answers",{}));
  const [reasons,setReasonsRaw]=useState(()=>loadLS("os_reasons",{}));
  const [psub,setPsub]=useState("bank"); const [pcat,setPcat]=useState("All");
  const [pst,setPst]=useState(()=>loadLS("os_practice",{att:{},rate:{}})); const [picks,setPicks]=useState({});
  const [boardQS,setBoardQS]=useState(()=>buildQuestions());
  useEffect(()=>{ fetch("questions.board.json?v=4").then(r=>r.json()).then(arr=>{
    const mapped=(arr||[]).map((q,i)=>{ const it={id:q.caseId+"-"+q.origQuestionId+"-b",caseId:q.caseId,caseTitle:q.caseTitle,
      system:q.system,topic:q.topic,vignette:q.vignette,leadIn:q.leadIn,options:q.options,answerIndex:q.answerIndex,
      explanation:q.explanation,source:"Forge",citableId:"OS-2026-"+String(i+1).padStart(4,"0")}; it.lint=boardLint(it); return it; });
    if(mapped.length) setBoardQS(mapped); }).catch(()=>{}); },[]);
  const [contrib,setContrib]=useState(()=>loadLS("os_contrib",{qs:[],counter:100}));
  const [csub,setCsub]=useState("author"); const [draft,setDraft]=useState(blankDraft); const [audit,setAudit]=useState(null);

  useEffect(()=>{ document.documentElement.setAttribute("data-theme",theme); saveLS("os_theme",theme); },[theme]);
  useEffect(()=>{ if("scrollRestoration" in history) history.scrollRestoration="manual"; },[]);
  useEffect(()=>{ window.scrollTo({top:0,left:0,behavior:"auto"}); },[mode,activeId,psub,csub]);
  useEffect(()=>saveLS("os_practice",pst),[pst]);
  useEffect(()=>saveLS("os_contrib",contrib),[contrib]);
  useEffect(()=>saveLS("os_auth",auth),[auth]);

  // ---- auth ----
  const me = auth.currentEmail ? auth.users[auth.currentEmail] : null;
  const isAdmin = me && ADMIN_EMAILS.includes(me.email);
  const isContributor = me && me.role==="contributor" && me.app && me.app.status==="approved";
  const userName = email => (auth.users[email]||{}).name || email || "OpenStems editorial";
  const signIn = (email,name)=>setAuth(a=>{ const u={...a.users}; if(!u[email]) u[email]={name:name||email,email,role:"learner",app:{status:"none"}}; return {...a,users:u,currentEmail:email}; });
  const signOut = ()=>{ setAuth(a=>({...a,currentEmail:null})); setMode("home"); };
  const applyContributor = form=>setAuth(a=>{ const u={...a.users}; const cur=u[a.currentEmail]; u[a.currentEmail]={...cur,app:{status:"pending",...form}}; return {...a,users:u}; });
  const decideApp = (email,decision)=>setAuth(a=>{ const u={...a.users}; const usr=u[email]; if(!usr)return a;
    u[email]= decision==="approve" ? {...usr,role:"contributor",app:{...usr.app,status:"approved"}} : {...usr,app:{...usr.app,status:"denied"}}; return {...a,users:u}; });

  const cases=(window.CASES||[]).filter(c=>c.active!==false);
  const setProgress=u=>setProgressRaw(prev=>{ const np=typeof u==="function"?u(prev):u; saveLS("os_progress",np); return np; });
  const toggleReview=id=>setReview(prev=>{ const np=prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]; saveLS("os_review",np); return np; });
  const setAnswers=(id,pid,v)=>setAnswersRaw(prev=>{ const np={...prev,[id]:{...(prev[id]||{}),[pid]:v}}; saveLS("os_answers",np); return np; });
  const setReasonAnswer=(id,txt)=>setReasonsRaw(prev=>{ const np={...prev,[id]:txt}; saveLS("os_reasons",np); return np; });
  const openCase=id=>{ setActiveId(id); setMode("learn"); };
  const goHome=()=>{ setMode("home"); setActiveId(null); };
  const goCase=id=>{ setMode("learn"); setActiveId(id); };
  const caseData=cases.find(c=>c.id===activeId);

  const pubContrib=contrib.qs.filter(q=>q.status==="published").map(q=>{ const it={...q,source:"Community"}; it.lint=boardLint(it); return it; });
  const QS=[...boardQS,...pubContrib];
  const caseCount=new Set(boardQS.map(q=>q.caseId)).size; const ready=QS.filter(q=>q.lint.ok).length;
  const lastAtt=qid=>{ const a=pst.att[qid]||[]; return a.length?a[a.length-1]:null; };
  const due=QS.filter(q=>{ const l=lastAtt(q.id); return l&&!l.correct; });
  const bankCats=(()=>{ const pr=[]; CATEGORY_ORDER.forEach(k=>{ if(QS.some(q=>categoryOf(q.system)===k)) pr.push(k); });
    QS.forEach(q=>{ const k=categoryOf(q.system); if(!pr.includes(k)) pr.push(k); }); return ["All",...pr]; })();
  const bankList = pcat==="All"?QS:QS.filter(q=>categoryOf(q.system)===pcat);
  const pick=(qid,i,correct)=>{ setPicks(s=>({...s,[qid]:i})); if(me) setPst(s=>{ const att={...s.att}; att[qid]=[...(att[qid]||[]),{correct}]; return {...s,att}; }); };
  const rate=(qid,n)=>setPst(s=>({...s,rate:{...s.rate,[qid]:n}}));
  const updateC=fn=>setContrib(s=>{ const c=JSON.parse(JSON.stringify(s)); fn(c); return c; });
  const submitDraft=()=>{ const a=boardLint(draft); setAudit(a); if(!a.ok)return;
    updateC(c=>{ c.qs.push({id:"c"+Date.now(),citableId:null,status:"in_review",caseId:null,caseTitle:null,...JSON.parse(JSON.stringify(draft)),authorId:me.email,reviews:[]}); });
    setDraft(blankDraft); setAudit(null); setCsub("review"); };
  const reviewItem=(qid,decision)=>updateC(c=>{ const q=c.qs.find(x=>x.id===qid); q.reviews.push({reviewerId:me.email,decision});
    const ap=q.reviews.filter(r=>r.decision==="approve").length;
    if(decision==="reject") q.status="rejected"; else if(ap>=2){ q.status="published"; c.counter+=1; q.citableId="OS-2026-"+String(c.counter).padStart(4,"0"); } });

  const PracticeBank=({list,empty})=> (<div>
    {list.length===0 ? <div className="inprog">{empty}</div> :
      list.map(q=><PracticeCard key={q.id} q={q} picked={picks[q.id]} onPick={i=>pick(q.id,i,i===q.answerIndex)}
        rated={pst.rate[q.id]||0} onRate={n=>rate(q.id,n)} onGoCase={()=>goCase(q.caseId)} onOpenAuthor={openAuthor} />)}
  </div>);

  const PracticeView=()=> (<section className="section" style={{paddingTop:34}}><div className="wrap">
    <div className="sec-head"><div className="kicker">Practice · board questions</div><h2 className="h2">Practice on the same topics</h2>
      <p className="sec-lead">New to a topic? Start in Learn, then return here to test yourself.</p></div>
    <div className="cat-tabs">
      <button className={"cat-tab "+(psub==="bank"?"active":"")} onClick={()=>setPsub("bank")}>Question bank<span className="cat-count">{QS.length}</span></button>
      <button className={"cat-tab "+(psub==="srq"?"active":"")} onClick={()=>{ setPsub("srq"); setPicks({}); }}>Spaced review<span className="cat-count">{due.length}</span></button>
      <button className={"cat-tab "+(psub==="prog"?"active":"")} onClick={()=>setPsub("prog")}>My progress</button>
    </div>
    {psub==="bank" && (<>
      <div className="banner">{boardQS.length} board questions written from {caseCount} Ward Moments cases and run through the Forge gate{pubContrib.length?(", plus "+pubContrib.length+" community-published"):""}. {ready} of {QS.length} pass every hard board-exam check. Each links back to its case in Learn.</div>
      <div className="cat-tabs">{bankCats.map(t=>{ const count=t==="All"?QS.length:QS.filter(q=>categoryOf(q.system)===t).length;
        return (<button key={t} className={"cat-tab "+(pcat===t?"active":"")} onClick={()=>setPcat(t)}>{t==="All"?"All topics":t}<span className="cat-count">{count}</span></button>); })}</div>
      <PracticeBank list={bankList} empty={<p>No questions in this category yet.</p>} />
    </>)}
    {psub==="srq" && (<>
      <div className="banner">Questions you miss come back here until you get them right. {due.length} due now.</div>
      <PracticeBank list={due} empty={<p>Nothing due. Miss a few in the question bank and they will queue up here.</p>} />
    </>)}
    {psub==="prog" && (()=>{
      const atts=[]; QS.forEach(q=>(pst.att[q.id]||[]).forEach(a=>atts.push({...a,system:q.system})));
      const seen=new Set(); QS.forEach(q=>{ if((pst.att[q.id]||[]).length) seen.add(q.id); });
      const total=atts.length,correct=atts.filter(a=>a.correct).length,acc=total?Math.round(100*correct/total):0;
      const bySys={}; atts.forEach(a=>{ (bySys[a.system]=bySys[a.system]||{c:0,t:0}).t++; if(a.correct)bySys[a.system].c++; });
      return (<div><div className="how-grid" style={{marginBottom:18}}>
        <div className="how-card"><div style={{fontSize:"0.8rem",color:"var(--mid)"}}>Questions seen</div><div className="stat-num">{seen.size}</div></div>
        <div className="how-card"><div style={{fontSize:"0.8rem",color:"var(--mid)"}}>Total answers</div><div className="stat-num">{total}</div></div>
        <div className="how-card"><div style={{fontSize:"0.8rem",color:"var(--mid)"}}>Accuracy</div><div className={"stat-num "+(acc>=70?"good":"warn")}>{acc}%</div></div>
        <div className="how-card"><div style={{fontSize:"0.8rem",color:"var(--mid)"}}>Due for review</div><div className={"stat-num "+(due.length?"warn":"good")}>{due.length}</div></div>
      </div>
      <div className="qblock"><div className="reveal-title">Accuracy by system</div>
        {Object.keys(bySys).length===0 ? <p style={{color:"var(--dim)",marginTop:8}}>Answer some questions to see your breakdown.</p> :
          Object.entries(bySys).map(([s,v])=>{ const pc=Math.round(100*v.c/v.t); return (<div key={s} style={{margin:"10px 0"}}>
            <div style={{fontSize:"0.85rem",color:"var(--mid)",marginBottom:5}}>{s} — {v.c}/{v.t} ({pc}%)</div>
            <div className="os-bar"><div style={{width:pc+"%"}} /></div></div>); })}</div>
      </div>);
    })()}
  </div></section>);

  const ContributeWorkspace=()=> (<section className="section" style={{paddingTop:34}}><div className="wrap">
    <div className="sec-head"><div className="kicker">Contribute · {me.name}</div><h2 className="h2">Author and peer-review board questions</h2></div>
    <div className="step-row">
      <div className="step-card"><div className="step-n">1</div><div><h3>Write it</h3><p>You draft a question; the Forge quality gate checks it against board item-writing rules.</p></div></div>
      <div className="step-card"><div className="step-n">2</div><div><h3>Peer reviewed</h3><p>Two independent physicians review the item and approve it, request changes, or reject it.</p></div></div>
      <div className="step-card"><div className="step-n">3</div><div><h3>Selected &amp; published</h3><p>Approved questions are selected into the Practice bank with a citable ID. Learners then rate their quality.</p></div></div>
    </div>
    <div className="banner">To play out the two-reviewer flow, sign in as different contributors (use the demo accounts): author as one, then approve as two others.</div>
    <div className="cat-tabs">
      <button className={"cat-tab "+(csub==="author"?"active":"")} onClick={()=>setCsub("author")}>Write a question</button>
      <button className={"cat-tab "+(csub==="review"?"active":"")} onClick={()=>setCsub("review")}>Review queue<span className="cat-count">{contrib.qs.filter(q=>q.status==="in_review").length}</span></button>
      <button className={"cat-tab "+(csub==="cv"?"active":"")} onClick={()=>setCsub("cv")}>Contribution record</button>
    </div>
    {csub==="author" && (<div className="qblock">
      <div className="os-grid" style={{marginBottom:12}}>
        <div><div className="prompt-q" style={{marginBottom:6}}>Exam level</div>
          <select className="os-input" value={draft.level} onChange={e=>setDraft({...draft,level:e.target.value})}><option value="step1">Step 1 (mechanism)</option><option value="shelf">Shelf / Step 2 (clinical)</option></select></div>
        <div><div className="prompt-q" style={{marginBottom:6}}>System / topic</div>
          <input className="os-input" value={draft.system} onChange={e=>setDraft({...draft,system:e.target.value})} placeholder="e.g. Cardiology" /></div>
      </div>
      <div className="prompt-q" style={{marginBottom:6}}>Clinical vignette</div>
      <textarea className="answer-textarea" value={draft.vignette} onChange={e=>setDraft({...draft,vignette:e.target.value})} placeholder="A 68-year-old patient comes to..." />
      <div className="prompt-q" style={{margin:"12px 0 6px"}}>Lead-in</div>
      <input className="os-input" value={draft.leadIn} onChange={e=>setDraft({...draft,leadIn:e.target.value})} placeholder="Which of the following is the most likely diagnosis?" />
      <div className="prompt-q" style={{margin:"12px 0 6px"}}>Options (select the correct one)</div>
      {draft.options.map((o,i)=>(<div key={i} style={{display:"flex",gap:8,alignItems:"center",margin:"6px 0"}}>
        <input type="radio" checked={draft.answerIndex===i} onChange={()=>setDraft({...draft,answerIndex:i})} />
        <input className="os-input" value={o} onChange={e=>{ const op=[...draft.options]; op[i]=e.target.value; setDraft({...draft,options:op}); }} placeholder={"Option "+String.fromCharCode(65+i)} /></div>))}
      <div className="prompt-q" style={{margin:"12px 0 6px"}}>Explanation</div>
      <textarea className="answer-textarea" value={draft.explanation} onChange={e=>setDraft({...draft,explanation:e.target.value})} placeholder="Why the key is right and each distractor is wrong." />
      <div style={{marginTop:14}}><button className="submit-btn" style={{marginTop:0}} onClick={submitDraft}>Run Forge gate &amp; submit for peer review</button></div>
      {audit && (<div className="feedback" style={{borderLeftColor:audit.ok?"var(--good)":"var(--bad)"}}>
        <div className="fb-result" style={{color:audit.ok?"var(--good)":"var(--bad)"}}>{audit.ok?"✓ Passed the Forge gate, sent to peer review":"✗ Fix these before submitting:"}</div>
        {audit.fails.map((f,i)=><div key={i} style={{color:"var(--warn)",fontSize:"0.85rem"}}>• {f}</div>)}</div>)}
    </div>)}
    {csub==="review" && (contrib.qs.filter(q=>q.status==="in_review").length===0 ?
      <div className="inprog"><p>Review queue is empty. Write a question, then sign in as another approved contributor to review it.</p></div> :
      contrib.qs.filter(q=>q.status==="in_review").map(q=>{ const a=boardLint(q); const isAuthor=q.authorId===me.email;
        const mine=q.reviews.find(r=>r.reviewerId===me.email); const ap=q.reviews.filter(r=>r.decision==="approve").length;
        return (<div className="qblock" key={q.id}>
          <div className="qid"><span className="os-badge polish">in review</span> <span style={{color:"var(--mid)",textTransform:"none",letterSpacing:0,fontWeight:700,marginLeft:6}}>{q.system||"untagged"} · by {userName(q.authorId)} · {ap}/2 approvals</span></div>
          <div className="vignette"><div className="vignette-label">Clinical Vignette</div>{q.vignette}</div>
          <p className="qstem">{q.leadIn}</p>
          <div className="choices">{q.options.map((o,i)=>(<div key={i} className={"choice "+(i===q.answerIndex?"correct":"")}><span className="choice-letter">{String.fromCharCode(65+i)}</span><span>{o}</span></div>))}</div>
          <div className="feedback">{q.explanation}
            <div style={{marginTop:8,fontSize:"0.84rem",color:a.ok?"var(--good)":"var(--bad)"}}>Forge gate: {a.ok?"all hard checks pass":(a.fails.length+" issue(s): "+a.fails.join(", "))}</div>
            {isAuthor && <div style={{color:"var(--warn)",fontSize:"0.84rem",marginTop:6}}>You authored this; you cannot review your own item.</div>}
            {mine && !isAuthor && <div style={{color:"var(--warn)",fontSize:"0.84rem",marginTop:6}}>You already reviewed this item.</div>}
            {!isAuthor && !mine && (<div className="case-actions">
              <button className="submit-btn" style={{marginTop:0,background:"var(--good)"}} onClick={()=>reviewItem(q.id,"approve")}>Approve</button>
              <button className="ghost-btn" onClick={()=>reviewItem(q.id,"reject")}>Reject</button></div>)}
            <div style={{fontSize:"0.8rem",color:"var(--dim)",marginTop:8}}>Two physician approvals publish the item into the Practice bank and mint its citable ID.</div></div>
        </div>); }))}
    {csub==="cv" && (<div className="qblock">
      {(()=>{ const authored=contrib.qs.filter(q=>q.status==="published"&&q.authorId===me.email);
        const reviewed=contrib.qs.filter(q=>q.status==="published"&&q.reviews&&q.reviews.some(r=>r.reviewerId===me.email&&r.decision==="approve"));
        const cred=(me.app&&me.app.training)?me.app.training:"";
        const lines=[me.name+(cred?", "+cred:""),"OpenStems Board Question Commons, contribution record (as of June 2026)","","PEER-REVIEWED QUESTIONS AUTHORED ("+authored.length+"):"];
        authored.forEach(q=>lines.push("  "+q.citableId+"  "+(q.system||"")+" ("+(q.level==="step1"?"Step 1":"Shelf")+"). Reviewers: "+q.reviews.filter(r=>r.decision==="approve").map(r=>userName(r.reviewerId)).join(", ")+"."));
        if(!authored.length) lines.push("  (none yet)");
        lines.push("","PEER REVIEW SERVICE ("+reviewed.length+"):");
        reviewed.forEach(q=>lines.push("  "+q.citableId+"  "+(q.system||"")+". Served as peer reviewer."));
        if(!reviewed.length) lines.push("  (none yet)");
        const text=lines.join("\n");
        return (<div><div className="reveal-title">Citable contribution record</div>
          <p style={{fontSize:"0.85rem",color:"var(--mid)",margin:"6px 0 12px"}}>Every published item is a citable micro-publication, creditable to its author and both reviewers, the incentive that builds the bank for free.</p>
          <pre className="os-pre">{text}</pre>
          <button className="os-link" style={{marginTop:10}} onClick={()=>navigator.clipboard.writeText(text)}>Copy for CV</button></div>); })()}
    </div>)}
  </div></section>);

  return (<>
    <nav><div className="nav-inner">
      <button className="brand" onClick={goHome}><WMLogo /><span className="brand-name"><span>Open</span><span className="stem">Stems</span></span><span className="brand-tag">openstems.org</span></button>
      <div className="nav-pages">
        <button className={"nav-link "+(mode==="home"?"active":"")} onClick={goHome}>Home</button>
        <button className={"nav-link "+(mode==="learn"?"active":"")} onClick={()=>{ setActiveId(null); setMode("learn"); }}>Learn</button>
        <button className={"nav-link "+(mode==="practice"?"active":"")} onClick={()=>setMode("practice")}>Practice</button>
        <button className={"nav-link "+(mode==="contribute"?"active":"")} onClick={()=>setMode("contribute")}>Contribute</button>
        <button className={"nav-link "+(mode==="authors"?"active":"")} onClick={()=>{ setAuthorSel(null); setMode("authors"); }}>Authors</button>
        <button className={"nav-link "+(mode==="about"?"active":"")} onClick={()=>setMode("about")}>About</button>
        {isAdmin && <button className={"nav-link "+(mode==="admin"?"active":"")} onClick={()=>setMode("admin")}>Admin</button>}
      </div>
      <div className="nav-user">
        {me ? (<span className="usermenu"><span className="userchip">{me.name}</span>
            <span className={"rolebadge "+(isAdmin?"admin":(isContributor?"contributor":"learner"))}>{isAdmin?"admin":(isContributor?"contributor":"learner")}</span>
            <button className="nav-link" onClick={signOut}>Sign out</button></span>)
          : <button className="nav-link" onClick={()=>setMode("signin")}>Sign in</button>}
        <button className="theme-toggle" title="Toggle light / dark" onClick={()=>setTheme(t=>t==="dark"?"light":"dark")}>{theme==="dark"?"☀️":"🌙"}</button>
      </div>
    </div></nav>

    {mode==="home" && <Landing exampleCase={cases[0]} examplePractice={boardQS[0]} signedIn={!!me}
      onGetStarted={()=>{ if(me){ setActiveId(null); setMode("learn"); } else setMode("signin"); }}
      onGoLearn={()=>{ setActiveId(null); setMode("learn"); }} onGoPractice={()=>setMode("practice")} />}

    {mode==="signin" && <SignIn users={auth.users} onSignIn={(em,nm)=>{ signIn(em,nm); setMode("home"); }} />}

    {mode==="learn" && (!me ? <SignIn intent="Learn" users={auth.users} onSignIn={(em,nm)=>{ signIn(em,nm); setMode("learn"); }} />
      : (caseData ? (
        <CaseView caseData={caseData} onBack={()=>{ setActiveId(null); setMode("learn"); }} progress={progress} setProgress={setProgress}
          review={review} onToggleReview={toggleReview} answers={answers[caseData.id]||{}} setAnswers={setAnswers}
          reasonAnswer={reasons[caseData.id]||""} setReasonAnswer={setReasonAnswer} onOpenAuthor={openAuthor} />
      ) : (<section className="section" style={{paddingTop:30}}><div className="wrap">
        <WardMomentIntro />
        <div className="sec-head"><div className="kicker">Ward moments</div><h2 className="h2">Pick a ward moment to start</h2></div>
        <LearnLibrary cases={cases} onOpen={openCase} progress={progress} review={review} onToggleReview={toggleReview} />
      </div></section>)))}

    {mode==="practice" && (!me ? <SignIn intent="Practice" users={auth.users} onSignIn={(em,nm)=>{ signIn(em,nm); setMode("practice"); }} /> : <PracticeView />)}

    {mode==="contribute" && (!me ? <SignIn intent="Contribute" users={auth.users} onSignIn={(em,nm)=>{ signIn(em,nm); setMode("contribute"); }} />
      : (!isContributor ? <section className="section" style={{paddingTop:34}}><div className="wrap"><ContributorApplication me={me} onApply={applyContributor} /></div></section>
        : <ContributeWorkspace />))}

    {mode==="authors" && <AuthorsView sel={authorSel} setSel={setAuthorSel} />}

    {mode==="about" && <AboutView />}

    {mode==="admin" && isAdmin && (<section className="section" style={{paddingTop:34}}><div className="wrap">
      <div className="sec-head"><div className="kicker">Admin</div><h2 className="h2">Contributor applications</h2></div>
      <AdminQueue users={auth.users} onDecide={decideApp} />
    </div></section>)}

    <footer><div className="foot-inner">
      <div className="foot-left">OpenStems · learn the why, then practice the questions · built by a practicing hospitalist</div>
      <div className="foot-right">OPENSTEMS</div></div></footer>
  </>);
}

/* library grid for Learn */
function LearnLibrary({ cases, onOpen, progress, review, onToggleReview }){
  const [cat,setCat]=useState("All");
  const present=[]; CATEGORY_ORDER.forEach(k=>{ if(cases.some(c=>categoryOf(c.system)===k)) present.push(k); });
  cases.forEach(c=>{ const k=categoryOf(c.system); if(!present.includes(k)) present.push(k); });
  const tabs=["All",...present];
  const shown=cat==="All"?cases:cases.filter(c=>categoryOf(c.system)===cat);
  return (<>
    <div className="cat-tabs">{tabs.map(t=>{ const count=t==="All"?cases.length:cases.filter(c=>categoryOf(c.system)===t).length;
      return (<button key={t} className={"cat-tab "+(cat===t?"active":"")} onClick={()=>setCat(t)}>{t==="All"?"All cases":t}<span className="cat-count">{count}</span></button>); })}</div>
    <div className="lib-grid">{shown.map(c=>{ const isRev=review.includes(c.id);
      return (<div key={c.id} className="lib-card" onClick={()=>onOpen(c.id)}>
        <div className="lib-tag">{c.topic}</div><h3>{c.title}</h3><div className="lib-rot">{c.wardMoment.rotation}</div>
        <div className="lib-foot"><div className="prog-dots">{MODES.map(m=><div key={m.key} className={"pdot "+(progress[c.id]&&progress[c.id][m.key]?"done":"")} />)}</div>
          <span className="prog-text">{MODES.filter(m=>progress[c.id]&&progress[c.id][m.key]).length} / 4 tiers</span>
          <button className={"star-btn "+(isRev?"on":"")} title="Mark for review" onClick={e=>{ e.stopPropagation(); onToggleReview(c.id); }}>{isRev?"★":"☆"}</button></div>
      </div>); })}</div>
  </>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
